services:
  web:
    image: ${WEB_IMAGE:-snowiest-web:local}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NODE_VERSION: ${NODE_VERSION:-22}
        NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-https://snowiest.me}
    env_file:
      - ./apps/web/.env
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-https://snowiest.me}
    ports:
      - '${WEB_PORT:-3000}:3000'
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "node -e \"fetch('http://127.0.0.1:3000/').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
